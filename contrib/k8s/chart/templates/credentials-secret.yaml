{{- if and (not .Values.ollama.enabled) (not .Values.credentials.existingSecret) .Values.credentials.apiKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gas-city.fullname" . }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gas-city.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.credentials.existingSecretKey }}: {{ .Values.credentials.apiKey | quote }}
{{- end }}
