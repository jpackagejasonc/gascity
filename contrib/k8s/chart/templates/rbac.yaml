# Agent pods connect to Dolt and mcp-mail via cluster DNS — no K8s API access needed.
# The ServiceAccount is referenced by the controller when creating agent pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "gas-city.agentSAName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gas-city.labels" . | nindent 4 }}
    app.kubernetes.io/component: agent
