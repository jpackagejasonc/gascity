{{- if .Values.eventCleanup.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "gas-city.eventCleanupName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gas-city.labels" . | nindent 4 }}
    app.kubernetes.io/component: event-cleanup
spec:
  schedule: {{ .Values.eventCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 300
      template:
        spec:
          serviceAccountName: {{ include "gas-city.controllerSAName" . }}
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            runAsGroup: 1001
            fsGroup: 1001
            seccompProfile:
              type: RuntimeDefault
          containers:
          - name: cleanup
            image: {{ .Values.eventCleanup.image.repository }}:{{ .Values.eventCleanup.image.tag }}
            env:
            - name: HOME
              value: /tmp
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop: ["ALL"]
              readOnlyRootFilesystem: true
            command:
            - sh
            - -c
            - |
              cutoff=$(date -u -d '{{ .Values.eventCleanup.maxAgeHours }} hours ago' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                || date -u -v-{{ .Values.eventCleanup.maxAgeHours }}H +%Y-%m-%dT%H:%M:%SZ)
              echo "Pruning event ConfigMaps created before $cutoff..."
              kubectl -n {{ .Release.Namespace }} get configmaps -l gc/component=event \
                -o json | jq -r --arg cutoff "$cutoff" \
                '.items[] | select(.metadata.creationTimestamp < $cutoff) | .metadata.name' \
              | while read -r name; do
                  echo "  deleting $name"
                  kubectl -n {{ .Release.Namespace }} delete configmap "$name"
                done
              echo "Done."
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi
            volumeMounts:
            - name: tmp
              mountPath: /tmp
          volumes:
          - name: tmp
            emptyDir: {}
{{- end }}
