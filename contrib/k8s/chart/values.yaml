# Gas City Helm chart values.
#
# Install:
#   helm install gas-city contrib/k8s/chart --namespace gc --create-namespace
#
# See templates/NOTES.txt for post-install configuration steps.

# -- Override the fully qualified resource name prefix (default: <release>-gas-city).
fullnameOverride: ""

# Namespace creation. Set create: false if the namespace already exists.
namespace:
  create: true

# Controller mode. Set inCluster: true when running the gc controller inside
# the cluster (production). Leave false for a local gc binary using kubeconfig.
controller:
  inCluster: false
  # In-cluster controller image (only used when inCluster: true).
  image:
    repository: gc-controller
    tag: latest
    pullPolicy: IfNotPresent
  # City workspace name written into the generated city.toml ConfigMap.
  cityName: my-k8s-city
  # AI provider written into city.toml. Builtin names: claude, codex, gemini,
  # amp, opencode, cursor, copilot, auggie, pi, omp.
  provider: claude
  # gc HTTP API port exposed by the controller Service (only when inCluster: true).
  apiPort: 9443
  # gc dashboard port exposed by the controller Service (only when inCluster: true).
  dashboardPort: 7373
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 1
      memory: 3Gi

# Dolt SQL database (MySQL-compatible, used as the beads/events provider).
dolt:
  image:
    repository: dolthub/dolt
    tag: 1.86.6
    pullPolicy: IfNotPresent
  # Maximum concurrent connections. 100 agents × ~3 connections = 300; 500 gives burst headroom.
  maxConnections: 500
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi
  storage:
    size: 20Gi
    # storageClassName: "" uses the cluster default StorageClass.
    storageClassName: ""
  # PodDisruptionBudget for the Dolt StatefulSet. Protects against simultaneous
  # eviction during node drains. Only effective when external drain automation runs.
  pdb:
    enabled: false

# mcp-mail inter-agent messaging server.
mail:
  image:
    repository: gc-mcp-mail
    tag: latest
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 1
      memory: 1Gi

# Agent pod image/resources — referenced by city.toml, not deployed by this chart.
# These values are printed in NOTES.txt so you can paste them into city.toml.
agent:
  image:
    repository: gc-agent
    tag: latest
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2
      memory: 4Gi

# AI provider credentials injected into the controller pod.
# Set apiKey directly (chart creates a Secret) or reference an existingSecret.
# envVar must match what the provider CLI reads — common values:
#   claude/amp → ANTHROPIC_API_KEY
#   codex      → OPENAI_API_KEY
#   gemini     → GEMINI_API_KEY
credentials:
  apiKey: ""
  envVar: ANTHROPIC_API_KEY
  # Name of a pre-existing Secret. When set, apiKey is ignored.
  existingSecret: ""
  # Key within the existingSecret that holds the API key value.
  existingSecretKey: ANTHROPIC_API_KEY

# Image pull secrets for private container registries.
# Each entry must be the name of a Secret of type kubernetes.io/dockerconfigjson.
# Example: imagePullSecrets: [{name: my-registry-secret}]
imagePullSecrets: []

# Local Ollama LLM server for a self-contained demo (no external API key needed).
# When enabled: deploys Ollama, pulls the specified model, forces provider=opencode,
# and injects the Ollama connection env vars into all agent pods via city.toml.
ollama:
  enabled: false
  image:
    repository: ollama/ollama
    tag: latest
    pullPolicy: IfNotPresent
  # Model pulled on first startup. CPU-feasible options:
  #   codegemma:2b       (~1.6 GB) — code-tuned Gemma 2, good CPU demo default
  #   codegemma:7b       (~4.8 GB) — better quality, needs ~8 GB RAM
  #   qwen2.5-coder:1.5b (~1 GB)   — smaller alternative
  model: codegemma:2b
  storage:
    size: 10Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 2
      memory: 4Gi
    limits:
      cpu: 4
      memory: 8Gi

# Periodic cleanup of event ConfigMaps (label: gc/component=event).
eventCleanup:
  enabled: true
  schedule: "0 */6 * * *"
  maxAgeHours: 24
  image:
    repository: alpine/kubectl
    tag: 1.36.0
